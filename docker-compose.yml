version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: venusflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: venusflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: venusflow-api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/venusflow
      - JWT_SECRET=production-secret-change-me
      - NODE_ENV=production
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
