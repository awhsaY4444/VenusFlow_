services:
  - name: venusflow-api
    type: web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace server
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: venusflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CLIENT_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: VenusFlow <noreply@venusflow.com>

databases:
  - name: venusflow-db
    plan: free
